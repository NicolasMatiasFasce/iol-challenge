# -----------------------------------------------------------------------------
# Como usar este archivo
# 1) Deja UN solo bloque de reglas activo por vez.
# 2) Para cambiar: comenta el bloque activo y descomenta otro.
# 3) Si usas fail-open/fail-closed por regla, debe alinear con application.yml.
# -----------------------------------------------------------------------------

# Bloque activo (v1 recomendado): regla global balanceada
rules:
  - name: default
    method: "*"
    route: "*"
    upstreamUrl: "http://localhost:8081"
    capacity: 100
    refillRatePerSecond: 50
    identityHeader: X-Api-Key
    failMode: fail-open

